<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>NeoWAP</title><script src="https://telegram.org/js/telegram-web-app.js"></script><script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script><style>
:root{--bg:#0b0f0d;--text:#b7f7c0;--muted:#7aa88a;--accent:#6eff9e;--accent2:#3ddc84;--border:#1f3a2d}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;overflow:hidden;color:var(--text);font-family:monospace;background:radial-gradient(circle at 20% 10%,rgba(61,220,132,.08),transparent 40%),radial-gradient(circle at 80% 90%,rgba(61,220,132,.05),transparent 45%),var(--bg)}.app{max-width:480px;height:100vh;margin:0 auto;display:flex;flex-direction:column;background:rgba(0,0,0,.12)}.header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(61,220,132,.12);background:rgba(15,21,18,.92)}.logo{color:var(--accent);font-size:20px;text-shadow:0 0 10px rgba(110,255,158,.3)}.back{font-size:14px;color:var(--muted);cursor:pointer}.status{padding:8px 14px;color:var(--muted);font-size:12px;line-height:1.5;border-bottom:1px solid rgba(61,220,132,.08);background:rgba(15,21,18,.65)}.content{flex:1;overflow-y:auto;padding:12px;padding-bottom:175px}.screen{display:none}.screen.active{display:block}.card{background:rgba(15,21,18,.82);border:1px solid rgba(61,220,132,.14);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:inset 0 0 12px rgba(61,220,132,.03),0 6px 24px rgba(0,0,0,.3)}.title{color:var(--accent);margin-bottom:8px;font-size:17px}.subtitle{color:var(--muted);font-size:13px;line-height:1.45}.input{width:100%;padding:13px;margin-top:10px;background:#0c120f;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;font-family:monospace}.input:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 10px rgba(61,220,132,.12)}.btn{width:100%;margin-top:10px;border:none;border-radius:10px;padding:13px;background:var(--accent2);color:#05110a;font-size:16px;font-weight:bold;font-family:monospace}.btn.secondary{background:#122019;color:var(--text);border:1px solid var(--border)}.room{cursor:pointer;transition:.2s}.room:active{transform:scale(.98)}.room-name{color:var(--accent);margin-bottom:6px;font-size:16px;display:flex;justify-content:space-between;gap:8px}.online{color:var(--muted);font-size:12px}.room-desc{color:var(--muted);font-size:13px;line-height:1.4}.chat{display:flex;flex-direction:column;gap:10px}.msg{max-width:85%;padding:10px 12px;border-radius:12px;background:rgba(15,21,18,.82);border:1px solid rgba(61,220,132,.12);line-height:1.45;word-wrap:break-word}.msg.me{align-self:flex-end;background:rgba(19,34,26,.96)}.msg.system{max-width:100%;align-self:center;color:var(--muted);text-align:center;font-size:12px}.nick{color:var(--accent);font-size:12px;margin-bottom:5px}.rank{color:#d5ffd9}.typing{position:fixed;left:50%;transform:translateX(-50%);bottom:123px;width:100%;max-width:480px;padding:0 12px;color:var(--muted);font-size:12px;z-index:5;display:none}.input-bar{position:fixed;left:50%;transform:translateX(-50%);bottom:56px;width:100%;max-width:480px;padding:10px;background:linear-gradient(to top,rgba(11,15,13,.98),rgba(11,15,13,.8));border-top:1px solid rgba(61,220,132,.08);display:none}.input-bar.active,.typing.active{display:block}.send-row{display:flex;gap:8px}.send-row input{flex:1;margin:0}.send-btn{width:90px;margin:0}.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;height:56px;display:flex;justify-content:space-around;align-items:center;background:rgba(15,21,18,.95);border-top:1px solid rgba(61,220,132,.1)}.nav-item{color:var(--muted);font-size:11px;text-align:center}.error{margin-top:10px;color:#ff8b8b;font-size:13px}.ok{margin-top:10px;color:var(--accent);font-size:13px}.users{font-size:12px;color:var(--muted);margin-bottom:10px}
</style></head><body><div class="app"><div class="header"><div class="back" onclick="goHome()">← назад</div><div class="logo">NeoWAP</div><div id="topUser" style="font-size:12px;color:var(--muted)">offline</div></div><div class="status" id="statusText">● Поздняя волна интернета · 2007<br>Тихий чат для тех, кто помнит старую сеть.</div><div class="content"><div id="loginScreen" class="screen active"><div class="card"><div class="title">Вход</div><div class="subtitle">Ник и пароль как раньше.<br>Если ник свободен — он создастся. Если занят — нужен его пароль.</div><input id="nickInput" class="input" placeholder="ник" maxlength="20"><input id="passInput" class="input" type="password" placeholder="пароль" maxlength="60"><button class="btn" onclick="login()">Войти</button><div class="error" id="loginError"></div><div class="ok" id="loginOk"></div></div></div><div id="roomsScreen" class="screen"><div id="rooms"></div><div class="card"><div class="title">Закрытые комнаты</div><div class="subtitle">Позже тут появится создание приватной комнаты за 10⭐</div><button class="btn secondary" onclick="alert('Позже добавим')">Создать</button></div></div><div id="chatScreen" class="screen"><div class="users" id="roomUsers"></div><div class="chat" id="chat"></div></div><div id="profileScreen" class="screen"><div class="card"><div class="title">Профиль</div><div class="subtitle" id="profileText"></div><button class="btn secondary" onclick="logout()">Выйти</button></div></div></div><div class="typing" id="typingLine"></div><div class="input-bar" id="inputBar"><div class="send-row"><input id="msgInput" class="input" placeholder="Напиши что-нибудь..." oninput="sendTyping()" onkeydown="if(event.key==='Enter')sendMessage()"><button class="btn send-btn" onclick="sendMessage()">OK</button></div></div><div class="nav"><div class="nav-item" onclick="goHome()">🏠<br>Комнаты</div><div class="nav-item" onclick="goChat()">💬<br>Чат</div><div class="nav-item" onclick="goProfile()">👤<br>Профиль</div></div></div>
<script>
const SERVER_URL="https://neowap-production.up.railway.app";let socket=null,currentUser=null,currentRoom=null,typingTimer=null;let roomsOnline={};const rooms=[{id:"main",name:"Главная",desc:"Общий ламповый чат."},{id:"night",name:"Ночной двор",desc:"Для поздних разговоров."},{id:"nostalgia",name:"2007 memories",desc:"Аська, Nokia, старые сайты."},{id:"quiet",name:"Тихая комната",desc:"Для тех, кто просто хочет посидеть."}];
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");if(id==="chatScreen"&&currentRoom){document.getElementById("inputBar").classList.add("active")}else{document.getElementById("inputBar").classList.remove("active");document.getElementById("typingLine").classList.remove("active")}}function renderRooms(){let html="";rooms.forEach(room=>{html+=`<div class="card room" onclick="enterRoom('${room.id}')"><div class="room-name"><span>${room.name}</span><span class="online">${roomsOnline[room.id]||0} online</span></div><div class="room-desc">${room.desc}</div></div>`});document.getElementById("rooms").innerHTML=html}
async function login(){const nick=document.getElementById("nickInput").value.trim(),password=document.getElementById("passInput").value.trim(),error=document.getElementById("loginError"),ok=document.getElementById("loginOk");error.innerText="";ok.innerText="";if(nick.length<3){error.innerText="Ник минимум 3 символа.";return}if(password.length<4){error.innerText="Пароль минимум 4 символа.";return}try{ok.innerText="Подключаюсь...";const res=await fetch(SERVER_URL+"/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nick,password})});const data=await res.json();if(!res.ok||!data.ok){ok.innerText="";error.innerText=data.error||"Ошибка входа.";return}currentUser={id:data.user.id,nick:data.user.nick,messages:Number(data.user.messages_count||0),role:data.user.role||"user",active_status:data.user.active_status||"No body 🌑",earned_status:data.user.earned_status||"No body 🌑"};localStorage.setItem("neowap_nick",currentUser.nick);localStorage.setItem("neowap_pass",password);ok.innerText=data.mode==="registered"?"Ник создан.":"Вход выполнен.";setTimeout(afterLogin,300)}catch(e){ok.innerText="";error.innerText="Сервер не отвечает."}}
async function afterLogin(){document.getElementById("topUser").innerText=currentUser.nick;renderRooms();connectSocket();showScreen("roomsScreen");try{const r=await fetch(SERVER_URL+"/rooms-online");const d=await r.json();if(d.ok){roomsOnline=d.rooms||{};renderRooms()}}catch(e){}}
function connectSocket(){if(socket)return;socket=io(SERVER_URL,{transports:["websocket","polling"]});socket.on("roomsOnline",data=>{roomsOnline=data||{};renderRooms()});socket.on("roomUsers",users=>{document.getElementById("roomUsers").innerText=users&&users.length?"Сейчас здесь: "+users.join(", "):""});socket.on("typing",data=>{if(!currentRoom||!data||data.user===currentUser.nick)return;const line=document.getElementById("typingLine");line.innerText=(data.active_status?data.active_status+" ":"")+data.user+" печатает...";line.classList.add("active");clearTimeout(typingTimer);typingTimer=setTimeout(()=>line.classList.remove("active"),1800)});socket.on("message",data=>{if(!data||!currentUser)return;if(data.user===currentUser.nick){if(typeof data.messages_count==="number")currentUser.messages=data.messages_count;if(data.active_status)currentUser.active_status=data.active_status;return}addMessage(data.user||"unknown",data.text||"",false,data.active_status||"No body 🌑")});socket.on("system",text=>{if(currentRoom)addSystem(text)})}
async function enterRoom(roomId){const room=rooms.find(r=>r.id===roomId);if(!room)return;currentRoom=room;document.getElementById("chat").innerHTML="";document.getElementById("roomUsers").innerText="";showScreen("chatScreen");document.getElementById("statusText").innerHTML=`● ${room.name} · ${roomsOnline[room.id]||0} online<br>${room.desc}`;addSystem("Ты вошёл в комнату.");await loadHistory(room.id);if(socket&&socket.connected){socket.emit("joinRoom",{room:room.id,user:currentUser.nick})}else{addSystem("Подключаюсь к серверу...");connectSocket();setTimeout(()=>{if(socket&&socket.connected)socket.emit("joinRoom",{room:room.id,user:currentUser.nick})},1000)}setTimeout(()=>addMessage("Sabrina","Можно просто читать. Не обязательно сразу что-то говорить.",false,"NeoWAP Host"),700)}
async function loadHistory(roomId){try{const res=await fetch(SERVER_URL+"/messages/"+encodeURIComponent(roomId));const data=await res.json();if(data.ok&&Array.isArray(data.messages)&&data.messages.length){addSystem("Последние сообщения комнаты:");data.messages.forEach(m=>addMessage(m.user_nick,m.text,currentUser&&m.user_nick===currentUser.nick,m.active_status||"No body 🌑"))}}catch(e){addSystem("История сообщений пока не загрузилась.")}}
function sendTyping(){if(socket&&socket.connected&&currentRoom&&currentUser){socket.emit("typing",{room:currentRoom.id,user:currentUser.nick,active_status:currentUser.active_status})}}function sendMessage(){const input=document.getElementById("msgInput"),text=input.value.trim();if(!text||!currentRoom||!currentUser)return;input.value="";addMessage(currentUser.nick,text,true,currentUser.active_status);if(socket&&socket.connected){socket.emit("message",{room:currentRoom.id,user:currentUser.nick,text:text})}else{addSystem("Сообщение показано у тебя, но сервер не подключён.")}maybeSabrina(text)}function addMessage(user,text,me,status){const chat=document.getElementById("chat"),div=document.createElement("div");div.className="msg"+(me?" me":"");div.innerHTML=`<div class="nick"><span class="rank">${escapeHtml(status||"No body 🌑")}</span> ${escapeHtml(user)}</div><div>${escapeHtml(text)}</div>`;chat.appendChild(div);scrollChat()}function addSystem(text){const chat=document.getElementById("chat"),div=document.createElement("div");div.className="msg system";div.innerText=text;chat.appendChild(div);scrollChat()}function scrollChat(){const content=document.querySelector(".content");setTimeout(()=>{content.scrollTop=content.scrollHeight},50)}function maybeSabrina(text){if(Math.random()>0.88){setTimeout(()=>{const replies=["Иногда проще говорить с незнакомцами.","Тут можно быть собой.","Поздней ночью люди честнее.","Многие здесь тоже просто устали."];addMessage("Sabrina",replies[Math.floor(Math.random()*replies.length)],false,"NeoWAP Host")},1200)}}function goHome(){if(!currentUser){showScreen("loginScreen");return}currentRoom=null;document.getElementById("statusText").innerHTML="● Поздняя волна интернета · 2007<br>Тихий чат для тех, кто помнит старую сеть.";showScreen("roomsScreen")}function goChat(){if(currentRoom)showScreen("chatScreen")}function goProfile(){if(!currentUser)return;const left=Math.max(0,1000-currentUser.messages);document.getElementById("profileText").innerHTML=`Ник: <b>${escapeHtml(currentUser.nick)}</b><br>Роль: <b>${escapeHtml(currentUser.role)}</b><br>Сообщений: <b>${currentUser.messages}</b><br>Статус: <b>${escapeHtml(currentUser.active_status)}</b><br>До Star ⭐: <b>${left}</b>`;showScreen("profileScreen")}function logout(){localStorage.removeItem("neowap_nick");localStorage.removeItem("neowap_pass");currentUser=null;currentRoom=null;if(socket){socket.disconnect();socket=null}location.reload()}function escapeHtml(str){return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}window.onload=async function(){try{const tg=window.Telegram?.WebApp;if(tg){tg.expand();tg.ready()}}catch(e){}const nick=localStorage.getItem("neowap_nick"),pass=localStorage.getItem("neowap_pass");if(nick&&pass){document.getElementById("nickInput").value=nick;document.getElementById("passInput").value=pass;await login()}else{showScreen("loginScreen")}};
</script></body></html>
